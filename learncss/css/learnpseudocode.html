<html>
    <head>
        <meta charset ='utf-8'>
        <title> tiêu đề </title>
        <style type="text/css">
        a:link{color: red;}
        a:visited{color: purple;}
        a:hover{color: green;}
        a:active{color: blue;}
        tbody tr:nth-child(odd){background-color: rgb(159, 98, 98);}
        tbody tr:nth-child(even){background-color:pink;}
        tbody tr:hover{background-color: #ddd;}
        </style>
    </head>
    <body>
       <h3>Đây là một đoạn văn bản.</h3>
       <a href="https://is.uel.edu.vn" visited>Đây là một liên kết.</a> 
       <table border="1">
        <thead>
        <tr>
            <th>Trạng thái</th>
            <th>Màu sắc</th>
        </thead>
        <tbody>
        <tr>
            <td>Liên kết chưa được truy cập</td>
            <td>Đỏ</td>
        </tr>
        <tr>
            <td>Liên kết đã được truy cập</td>
            <td>Tím</td>
        </tr>
        <tr>
            <td>Khi di chuột qua liên kết</td>
            <td>Xanh lá cây</td>
        </tr>
        <tr>
            <td>Khi liên kết đang được kích hoạt</td>

        </tr>

</html>
