<html>
    <head>
        <meta charset ='utf-8'>
        <title> tiêu đề </title>
        <script type="text/javascript">
            function loadCustomer(){

                //get tbody id
                var mytablebody=document.getElementById("mytablebody");
                //create 10 rows    
                for ( var i=1;i<=10;i++){
                    id="c"+i
                    name="Customer "+i;
                    //create a row
                    new_row="<tr><td>"+i+"</td><td>"+name+"</td></tr>";
                    //add row to tbody
                    mytablebody.innerHTML+=new_row;


                }

            }
        </script>
        
    </head>
    <body>
       <table id="1" border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody id="mytablebody">

        </tbody>
        <script type="text/javascript">
            loadCustomer();
        </script>
       </table> 
    </body>
</html>
